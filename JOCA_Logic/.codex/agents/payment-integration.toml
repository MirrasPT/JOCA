## Webhook Handling

```php
// routes/api.php
Route::post('/stripe/webhook', [StripeWebhookController::class, 'handle'])
    ->middleware('stripe.verify'); // HMAC verification

// Controller
public function handle(Request $request)
{
    $payload = $request->getContent();
    $sigHeader = $request->header('Stripe-Signature');

    $event = \Stripe\Webhook::constructEvent(
        $payload, $sigHeader, config('services.stripe.webhook_secret')
    );

    // Idempotency: check if already processed
    if (WebhookLog::where('stripe_event_id', $event->id)->exists()) {
        return response('Already processed', 200);
    }

    WebhookLog::create(['stripe_event_id' => $event->id, 'type' => $event->type]);

    match ($event->type) {
        'checkout.session.completed' => $this->handleCheckoutComplete($event),
        'invoice.payment_succeeded' => $this->handleInvoicePaid($event),
        'invoice.payment_failed' => $this->handlePaymentFailed($event),
        'customer.subscription.deleted' => $this->handleSubscriptionCanceled($event),
        default => null,
    };

    return response('OK', 200);
}
```

