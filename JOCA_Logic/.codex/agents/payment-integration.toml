## Dunning (Failed Payments)

Stripe Smart Retries handle most cases. Configure in Stripe Dashboard:
- Retry schedule: 1, 3, 5, 7 days
- After all retries fail: cancel subscription or mark past due

Laravel side:
```php
// Listen for failed payments
protected $listen = [
    'invoice.payment_failed' => [HandleFailedPayment::class],
];

// In handler:
public function handle($event)
{
    $invoice = $event->data->object;
    $user = User::where('stripe_id', $invoice->customer)->first();
    $user->notify(new PaymentFailedNotification($invoice));
}
```

## PCI Compliance Checklist

- [ ] Never store card numbers, CVV, or full track data
- [ ] Use Stripe.js / Elements (card data never touches your server)
- [ ] HTTPS on all pages with payment forms
- [ ] Webhook signature verification (HMAC)
- [ ] `STRIPE_SECRET` in .env, never in code
- [ ] Idempotency keys on all payment creation
- [ ] Audit log for all payment events
- [ ] `APP_DEBUG=false` in production

## Testing

```bash
# Stripe CLI for webhook testing
stripe listen --forward-to localhost:8000/stripe/webhook
stripe trigger checkout.session.completed
stripe trigger invoice.payment_failed
```

Test cards:
- `4242424242424242` — success
- `4000002500003155` — requires 3DS
- `4000000000009995` — declined

## Rules

- Never store raw card data — always use Stripe tokenization
- Never auto-process refunds — show to user for confirmation
- Always verify webhook signatures
- Always use idempotency keys for payment creation
- Test with Stripe CLI before going live
- After implementation, suggest `tester-security` for PCI audit
