## Mode 2 — Load Testing (k6 / Artillery)

**Never run stress/spike on production without coordinating with team.**
Start order: smoke → load → stress.

### Step 1 — Clarify goal

1. Target URL(s) — what to test?
2. Test type — smoke / load / stress / spike / soak
3. Expected load — VUs, duration
4. SLAs — p95 < Xms, error rate < Y%
5. Auth — does endpoint require token?

### Test types

| Type | Purpose | Config |
|---|---|---|
| **Smoke** | Sanity after deploy | 1 VU, 1 min |
| **Load** | Normal traffic | Target VUs, 10-30 min |
| **Stress** | Find breaking point | Ramp past expected |
| **Spike** | Sudden surge | Rapid ramp + drop |
| **Soak** | Memory leaks | Moderate VUs, 2-8 hours |

### Smoke test

```javascript
// /tmp/smoke.js
import http from 'k6/http';
import { check } from 'k6';
export const options = {
  vus: 1, duration: '1m',
  thresholds: { http_req_failed: ['rate<0.01'], http_req_duration: ['p(95)<500'] },
};
export default function () {
  const res = http.get('https://example.com/api/health');
  check(res, { 'status 200': (r) => r.status === 200 });
}
```

### Load test

```javascript
// /tmp/load.js
import http from 'k6/http';
import { check, sleep } from 'k6';
export const options = {
  stages: [
    { duration: '2m', target: 20 },
    { duration: '10m', target: 20 },
    { duration: '2m', target: 0 },
  ],
  thresholds: {
    http_req_failed: ['rate<0.01'],
    http_req_duration: ['p(95)<500', 'p(99)<1000'],
  },
};
const BASE_URL = 'https://example.com';
const TOKEN = __ENV.API_TOKEN;
export default function () {
  const params = { headers: { Authorization: `Bearer ${TOKEN}` } };
  const res = http.get(`${BASE_URL}/api/posts`, params);
  check(res, { 'posts 200': (r) => r.status === 200 });
  sleep(1);
}
```

### Stress test

```javascript
// /tmp/stress.js
import http from 'k6/http';
import { check, sleep } from 'k6';
export const options = {
  stages: [
    { duration: '2m', target: 10 },
    { duration: '3m', target: 50 },
    { duration: '3m', target: 100 },
    { duration: '3m', target: 200 },
    { duration: '3m', target: 300 },
    { duration: '5m', target: 0 },
  ],
  thresholds: { http_req_failed: ['rate<0.10'] },
};
export default function () {
  const res = http.get('https://example.com/api/posts');
  check(res, { 'status ok': (r) => r.status < 500 });
  sleep(1);
}
```

### Spike test

```javascript
export const options = {
  stages: [
    { duration: '1m', target: 5 },
    { duration: '30s', target: 200 },
    { duration: '1m', target: 200 },
    { duration: '30s', target: 5 },
    { duration: '2m', target: 5 },
    { duration: '30s', target: 0 },
  ],
};
```

### POST with auth

```javascript
import http from 'k6/http';
import { check, sleep } from 'k6';
const BASE_URL = 'https://example.com';
export function setup() {
  const res = http.post(`${BASE_URL}/api/login`,
    JSON.stringify({ email: 'test@example.com', password: 'password' }),
    { headers: { 'Content-Type': 'application/json' } }
  );
  return { token: res.json('access_token') };
}
export default function (data) {
  const params = { headers: { Authorization: `Bearer ${data.token}`, 'Content-Type': 'application/json' } };
  const res = http.post(`${BASE_URL}/api/posts`,
    JSON.stringify({ title: 'Load test post', content: 'Content' }), params
  );
  check(res, { 'created': (r) => r.status === 201 });
  sleep(2);
}
```

### Running k6

```bash
k6 run /tmp/load.js
k6 run -e API_TOKEN=your-token -e BASE_URL=https://staging.example.com /tmp/load.js
k6 run --out json=/tmp/results.json /tmp/load.js
```

### Key metrics

| Metric | Good threshold |
|---|---|
| `http_req_duration` p95 | < 500ms |
| `http_req_failed` | < 1% (load), < 10% (stress) |

### Artillery (cloud-scale)

```yaml
# artillery-config.yml
config:
  target: "https://api.example.com"
  phases:
    - duration: 60
      arrivalRate: 5
      name: "Warm up"
    - duration: 300
      arrivalRate: 50
      name: "Load"
scenarios:
  - name: "API test"
    flow:
      - post:
          url: "/api/login"
          json: { email: "test@example.com", password: "password" }
          capture:
            - json: "$.access_token"
              as: "token"
          expect: [{ statusCode: 200 }]
      - get:
          url: "/api/posts"
          headers: { Authorization: "Bearer {{ token }}" }
          expect: [{ statusCode: 200 }, { responseTime: 500 }]
```

```bash
artillery run artillery-config.yml
artillery quick --count 20 --num 50 https://example.com/api/health
```

### Load Test Report Format

```markdown
# Load Test Report — <URL>
**Date:** YYYY-MM-DD | **Type:** smoke/load/stress/spike/soak
**Tool:** k6 | **Duration:** Xmin | **Peak VUs:** N

## Results
| Metric | Value | Threshold | Status |
|---|---|---|---|
| p95 response time | Xms | < 500ms | ✅/❌ |
| p99 response time | Xms | < 1000ms | ✅/❌ |
| Error rate | X% | < 1% | ✅/❌ |
| Breaking point | ~N VUs | — | — |

## Issues Found / Recommendations
```

Always set `thresholds` — tests without pass/fail criteria are just data. Use `sleep()` — real users have think time. Monitor server-side during test: CPU, memory, DB connections, queue depth.

