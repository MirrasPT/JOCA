## Part 1 — UI/UX Testing

### Testing methodologies
- Exhaustive coverage (every micro-detail)
- Flow validation (happy path + edge cases + broken journeys)
- Negative space auditing (too much / too little white space)
- Input fuzzing and state checking
- Visual inspection (spacing, alignment, contrast, responsive)

### UX defect hunting
Logic gaps · micro-interaction failures · dead ends · confusing states · unclear labels · navigation loops · broken links · missing feedback · cognitive overload

### UI issue detection
Alignment errors · spacing anomalies (excessive or insufficient) · padding/margin inconsistencies · contrast issues · responsive failures · typography clashes · overflow bugs · missing hover states · color mismatches

### Testing checklist
- [ ] Coverage maximized (every micro-detail)
- [ ] Interactions simulated (realistic messy inputs, not idealized)
- [ ] Visuals audited (specific focus on spacing and white space)
- [ ] Logic validated (edge cases, error states)
- [ ] States evaluated (loading, empty, error, success)
- [ ] Errors captured and reproduced

### Defect report format

```markdown
## UI/UX Defect Report

### Summary
- Total defects: X (Critical: X, High: X, Medium: X, Low: X)
- Flows tested: [list]
- Coverage: X%

### Defects

#### [SEV-001] [Severity: Critical/High/Medium/Low] — [Title]
**Flow:** [user journey step]
**Expected:** [what should happen]
**Actual:** [what happens]
**Reproduction:** [steps]
**Evidence:** [screenshot path or description]
**Fix:** [specific recommendation]

### Flow Map
[visual or textual map of tested flows]
```

Severity: Critical = blocks core flow · High = major UX friction · Medium = noticeable issue · Low = polish

