## Part 2 — Accessibility Testing (WCAG 2.1/3.0)

### WCAG compliance checklist

**Perceivable**
- [ ] All images have descriptive `alt` text (decorative: `alt=""`)
- [ ] Color is not the only means of conveying information
- [ ] Color contrast ≥ 4.5:1 (normal text), ≥ 3:1 (large text)
- [ ] Audio/video has captions or transcript
- [ ] Text can be resized to 200% without loss of functionality

**Operable**
- [ ] All functionality accessible by keyboard alone
- [ ] No keyboard trap (user can always exit a component)
- [ ] Skip links present ("Skip to main content")
- [ ] Focus indicators visible on all interactive elements
- [ ] No content that flashes > 3 times/second
- [ ] Touch targets ≥ 44×44px (mobile)

**Understandable**
- [ ] Language declared (`<html lang="pt">`)
- [ ] Labels associated with form inputs
- [ ] Error messages identify the field and describe the fix
- [ ] Required fields clearly marked
- [ ] Consistent navigation across pages

**Robust**
- [ ] Valid HTML (no duplicate IDs, no invalid ARIA)
- [ ] ARIA roles, states, properties used correctly
- [ ] Interactive widgets follow ARIA authoring patterns
- [ ] Works with assistive technologies (VoiceOver, NVDA)

### Automated scan

```bash
# Run axe-core via Playwright (if available)
npx playwright test --grep accessibility 2>/dev/null

# Or use axe CLI
npx axe <URL> --exit 2>/dev/null | head -50
```

### Manual keyboard test

1. Tab through entire page — check order is logical
2. Use Enter/Space on all buttons and links
3. Open/close all modals, dropdowns, menus with keyboard
4. Fill forms without mouse
5. Verify focus never disappears into void

### ARIA audit

```bash
# Check for common ARIA issues in source
grep -r "aria-" src/ --include="*.tsx" --include="*.html" | grep -v "aria-label\|aria-hidden\|aria-describedby\|aria-live" | head -20
grep -r 'role="' src/ --include="*.tsx" --include="*.html" | head -20
```

Common ARIA mistakes:
- `role="button"` on `<div>` without `tabindex="0"` and keyboard handler
- `aria-label` on non-interactive elements
- Missing `aria-expanded` on toggles
- `aria-hidden="true"` on focusable elements

### Color contrast check

```bash
# Extract CSS colors for manual check (use WebAIM Contrast Checker)
grep -rE "color:|background:" src/ --include="*.css" --include="*.scss" | grep -v "//\|/*" | head -20
```

### Accessibility report format

```markdown
## Accessibility Report — WCAG 2.1 Level AA

### Score
- Critical violations: X (must fix before launch)
- Warnings: X (should fix)
- Passed: X/Y checks

### Critical Violations
#### [A-001] Missing alt text on images
**Impact:** Screen reader users cannot understand image content
**Elements:** img.hero-image, img.product-photo
**Fix:** Add descriptive `alt` attribute

#### [A-002] Insufficient color contrast
**Element:** .btn-secondary (ratio: 2.1:1, required: 4.5:1)
**Fix:** Change foreground to #595959

### Keyboard Navigation
- [ ] ✅/❌ Tab order logical
- [ ] ✅/❌ No keyboard traps
- [ ] ✅/❌ Focus indicators visible

### Screen Reader Compatibility
- [ ] ✅/❌ Landmarks present (main, nav, footer)
- [ ] ✅/❌ Headings hierarchical (h1→h2→h3)
- [ ] ✅/❌ Form labels associated
```

